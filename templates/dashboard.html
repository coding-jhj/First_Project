<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceGuide 대시보드</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d2e;
    --surface2: #222539;
    --border: #2e3250;
    --accent: #6c63ff;
    --accent2: #48bfe3;
    --danger: #ff4d6d;
    --warn: #f4a261;
    --safe: #52b788;
    --text: #e2e8f0;
    --muted: #7c85a2;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: grid;
    grid-template-rows: 56px 1fr;
    overflow: hidden;
  }

  /* ── 헤더 ─────────────────────────────────── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 24px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.3px;
  }
  .logo svg { width: 26px; height: 26px; }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .session-input {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
  }
  .session-input label { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .session-input input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 13px;
    width: 140px;
  }

  .pulse-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--safe);
    animation: pulse 2s infinite;
  }
  .pulse-dot.offline { background: var(--danger); animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(1.3); }
  }

  .status-text { font-size: 12px; color: var(--muted); }

  /* ── 메인 레이아웃 ────────────────────────── */
  main {
    display: grid;
    grid-template-columns: 340px 1fr;
    overflow: hidden;
    min-height: 0;
  }

  /* 중앙: 지도(상단) + 실시간 위험도(하단) */
  .center-column {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
    min-width: 0;
  }

  /* ── 왼쪽 패널 ────────────────────────────── */
  .panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-section {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 12px;
  }

  /* 통계 카드 */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }

  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    text-align: center;
  }
  .stat-value {
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-label { font-size: 10px; color: var(--muted); }
  .stat-card.danger .stat-value  { color: var(--danger); }
  .stat-card.warn .stat-value    { color: var(--warn); }
  .stat-card.safe .stat-value    { color: var(--safe); }

  /* 탐지 물체 목록 */
  .objects-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .objects-list::-webkit-scrollbar { width: 4px; }
  .objects-list::-webkit-scrollbar-track { background: transparent; }
  .objects-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .object-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slideIn 0.25s ease;
    transition: border-color 0.2s;
  }
  .object-card:hover { border-color: var(--accent); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .object-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .object-icon.critical { background: rgba(255,77,109,0.15); }
  .object-icon.beep     { background: rgba(244,162,97,0.15); }
  .object-icon.safe     { background: rgba(82,183,136,0.15); }

  .object-info { flex: 1; min-width: 0; }
  .object-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
  .object-meta { font-size: 11px; color: var(--muted); display: flex; gap: 8px; }

  .risk-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
    flex-shrink: 0;
  }
  .risk-badge.critical { background: rgba(255,77,109,0.2); color: var(--danger); }
  .risk-badge.beep     { background: rgba(244,162,97,0.2); color: var(--warn); }
  .risk-badge.silent   { background: rgba(82,183,136,0.2); color: var(--safe); }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--muted);
    font-size: 13px;
    padding: 40px;
    text-align: center;
  }
  .empty-state svg { opacity: 0.3; }

  /* ── 지도 영역 ────────────────────────────── */
  .map-container {
    position: relative;
    background: var(--bg);
    flex: 8;
    min-height: 0;
  }

  .analysis-panel {
    flex: 2;
    min-height: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: row;
    overflow: hidden;
  }
  .analysis-half {
    flex: 1;
    min-width: 0;
    padding: 14px 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    overflow-y: auto;
  }
  .analysis-half + .analysis-half {
    border-left: 1px solid var(--border);
  }
  .analysis-panel .section-title { margin-bottom: 0; }
  /* 경고안내 카드 */
  .alert-notice-card {
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    border: 1px solid var(--border);
    animation: slideIn 0.25s ease;
  }
  .alert-notice-card.critical { border-color: var(--danger); background: rgba(239,68,68,0.06); }
  .alert-notice-card.beep     { border-color: var(--warn);   background: rgba(251,146,60,0.06); }
  .alert-notice-card.silent   { border-color: var(--safe);   background: rgba(74,222,128,0.06); }
  .alert-notice-header { display: flex; align-items: center; gap: 8px; }
  .alert-mode-badge {
    font-size: 11px; font-weight: 700; padding: 2px 8px;
    border-radius: 4px; color: #fff; flex-shrink: 0;
  }
  .alert-mode-badge.critical { background: var(--danger); }
  .alert-mode-badge.beep     { background: var(--warn); }
  .alert-mode-badge.silent   { background: var(--safe); }
  .alert-sentence {
    font-size: 13px; font-weight: 600; line-height: 1.5;
    color: var(--text);
  }
  .alert-time { font-size: 11px; color: var(--muted); }
  .alert-history { display: flex; flex-direction: column; gap: 6px; }
  .alert-history-item {
    font-size: 11px; color: var(--muted); padding: 6px 10px;
    border-radius: 4px; background: var(--surface2);
    border-left: 3px solid var(--border);
  }
  .alert-history-item.critical { border-left-color: var(--danger); }
  .alert-history-item.beep     { border-left-color: var(--warn); }
  .alert-history-item.silent   { border-left-color: var(--safe); }
  .empty-alert {
    color: var(--muted); font-size: 12px;
    display: flex; align-items: center; gap: 6px;
  }
  #riskBarChart {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .risk-bar-row {
    font-size: 12px;
  }
  .risk-bar-label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
    gap: 8px;
  }
  .risk-bar-label span:first-child {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .risk-bar-track {
    background: var(--surface2);
    border-radius: 4px;
    height: 8px;
    overflow: hidden;
  }
  .risk-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.35s ease;
  }

  #map {
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  /* Leaflet 다크 테마 오버라이드 */
  .leaflet-tile { filter: brightness(0.85) saturate(0.8) hue-rotate(180deg) invert(1); }
  .leaflet-container { background: #111; }

  /* 줌 등 좌상단 컨트롤: 커스텀 범례( top-left 오버레이 ) 아래로 */
  .map-container .leaflet-top.leaflet-left {
    top: 55px;
    left: 10px;
  }

  /* 지도 위 오버레이 카드 */
  .map-overlay {
    position: absolute;
    z-index: 400;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    backdrop-filter: blur(8px);
    font-size: 12px;
  }

  .map-overlay.top-right {
    top: 16px; right: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 180px;
  }

  .gps-row {
    display: flex;
    justify-content: space-between;
    gap: 16px;
  }
  .gps-label { color: var(--muted); }
  .gps-value { font-family: monospace; color: var(--accent2); }

  .map-overlay.top-left {
    top: 16px; left: 16px;
    display: flex;
    gap: 8px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--muted);
    font-size: 11px;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* 타임스탬프 + FPS */
  .last-update {
    position: absolute;
    z-index: 400;
    bottom: 24px; right: 16px;
    font-size: 11px;
    color: var(--muted);
    text-align: right;
  }

  /* ── 저장된 경로 선택 (GPS 카드 내부) */
  .route-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 8px 0;
  }
  .route-select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 11px;
    padding: 4px 6px;
    outline: none;
    cursor: pointer;
    margin-top: 4px;
  }
  .route-select:focus { border-color: var(--accent); }

  /* ── 패널 상/하단 분할 ───────────────────────
     왼쪽 패널을 두 영역으로 나눈다.
     - panel-top  : 실시간 현황 (기존 내용)
     - panel-bottom: 24시간 탐지 내역 (신규)
     flex: 1 1 0 로 설정해 두 영역이 50:50 비율을 유지하면서
     각자 독립적으로 스크롤된다.
  ────────────────────────────────────────── */
  .panel-top {
    flex: 1 1 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;                          /* flex 자식 overflow 작동에 필수 */
    border-bottom: 2px solid var(--border); /* 상/하단 구분선 */
  }

  .panel-bottom {
    flex: 1 1 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }

  /* ── 24시간 요약 통계 카드 ────────────────
     실시간 현황의 stats-grid와 동일한 디자인이지만
     글자 크기를 줄여 좁은 공간에 맞춤.
  ────────────────────────────────────────── */
  .history-stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    margin-bottom: 4px;
  }

  .history-stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 8px;
    text-align: center;
  }
  .history-stat-card.danger .history-stat-value { color: var(--danger); }
  .history-stat-card.warn   .history-stat-value { color: var(--warn); }
  .history-stat-card.safe   .history-stat-value { color: var(--safe); }

  .history-stat-value {
    font-size: 18px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 2px;
  }
  .history-stat-label { font-size: 9px; color: var(--muted); }

  /* ── 24시간 탐지 내역 목록 ────────────────
     각 항목: 시각 + 물체명 + 위험도 뱃지
     objects-list 와 동일하게 overflow-y:auto 로 스크롤 가능.
  ────────────────────────────────────────── */
  .history-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 20px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .history-list::-webkit-scrollbar { width: 4px; }
  .history-list::-webkit-scrollbar-track { background: transparent; }
  .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .history-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    transition: border-color 0.2s;
  }
  .history-item:hover { border-color: var(--accent); }

  /* 탐지 시각 — 고정폭으로 정렬 */
  .history-time {
    color: var(--muted);
    font-size: 11px;
    font-family: monospace;
    min-width: 42px;
    flex-shrink: 0;
  }

  /* 물체 이름 목록 — 넘치면 말줄임 */
  .history-objects {
    flex: 1;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── 토스트 알림 */
  #toast {
    position: fixed;
    bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text);
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    z-index: 9999;
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<!-- ── 헤더 ───────────────────────────────────────────── -->
<header>
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
    VoiceGuide
  </div>

  <div class="header-right">
    <div class="session-input">
      <label>세션 ID (WiFi SSID)</label>
      <input id="sessionId" type="text" placeholder="__default__" value="__default__">
      <button onclick="loadSessions()" style="
        background:var(--accent);border:none;border-radius:6px;
        color:#fff;font-size:11px;font-weight:600;padding:3px 8px;cursor:pointer;">
        탐색
      </button>
    </div>
    <div id="sessionList" style="display:none;position:absolute;top:52px;right:24px;
      background:var(--surface2);border:1px solid var(--border);border-radius:8px;
      z-index:999;min-width:200px;overflow:hidden;"></div>
    <div style="display:flex;align-items:center;gap:6px;">
      <div class="pulse-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">연결 중...</span>
    </div>
  </div>
</header>

<!-- ── 메인 ───────────────────────────────────────────── -->
<main>

  <!-- 왼쪽 패널 -->
  <div class="panel">

    <!-- ▲ 상단: 실시간 현황 (기존과 동일) -->
    <div class="panel-top">

      <!-- 통계 카드 -->
      <div class="panel-section">
        <div class="section-title">실시간 현황</div>
        <div class="stats-grid">
          <div class="stat-card danger">
            <div class="stat-value" id="statCritical">0</div>
            <div class="stat-label">위험</div>
          </div>
          <div class="stat-card warn">
            <div class="stat-value" id="statBeep">0</div>
            <div class="stat-label">주의</div>
          </div>
          <div class="stat-card safe">
            <div class="stat-value" id="statSafe">0</div>
            <div class="stat-label">안전</div>
          </div>
        </div>
      </div>

      <!-- 탐지 물체 목록 -->
      <div class="panel-section" style="border-bottom:none; padding-bottom:8px;">
        <div class="section-title">탐지된 물체</div>
      </div>
      <div class="objects-list" id="objectsList">
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <span>탐지된 물체 없음<br>앱을 실행하세요</span>
        </div>
      </div>

    </div><!-- /panel-top -->

    <!-- ▼ 하단: 최근 24시간 탐지 내역 (신규) -->
    <div class="panel-bottom">

      <!-- 섹션 헤더 + 24시간 요약 통계 -->
      <div class="panel-section" style="padding-bottom:10px;">
        <div class="section-title">최근 24시간 탐지 내역</div>
        <!-- 실시간 현황과 같은 위험/주의/안전 카드 — 단, 24시간 누적 건수 표시 -->
        <div class="history-stats-grid">
          <div class="history-stat-card danger">
            <div class="history-stat-value" id="histCritical">—</div>
            <div class="history-stat-label">위험 건</div>
          </div>
          <div class="history-stat-card warn">
            <div class="history-stat-value" id="histBeep">—</div>
            <div class="history-stat-label">주의 건</div>
          </div>
          <div class="history-stat-card safe">
            <div class="history-stat-value" id="histSafe">—</div>
            <div class="history-stat-label">안전 건</div>
          </div>
        </div>
      </div>

      <!-- 탐지 이벤트 목록 (스크롤 가능) -->
      <div class="history-list" id="historyList">
        <div class="empty-state" style="padding:20px;">
          <span style="font-size:12px;">내역 불러오는 중...</span>
        </div>
      </div>

    </div><!-- /panel-bottom -->

  </div>

  <!-- 중앙: 지도 + 실시간 위험도 -->
  <div class="center-column">
  <div class="map-container">
    <div id="map"></div>

    <!-- GPS 정보 카드 -->
    <div class="map-overlay top-right" id="gpsCard">
      <div class="section-title" style="margin-bottom:8px;">GPS 위치</div>
      <div class="gps-row">
        <span class="gps-label">위도</span>
        <span class="gps-value" id="gpsLat">—</span>
      </div>
      <div class="gps-row">
        <span class="gps-label">경도</span>
        <span class="gps-value" id="gpsLng">—</span>
      </div>
      <div class="gps-row">
        <span class="gps-label">경로 포인트</span>
        <span class="gps-value" id="trackCount">0</span>
      </div>
      <div style="margin-top:8px;">
        <button onclick="saveCurrentRoute()" id="btnSaveRoute" style="
          width:100%;background:var(--surface2);border:1px solid var(--border);
          border-radius:6px;color:var(--muted);font-size:11px;font-weight:600;
          padding:5px 8px;cursor:pointer;transition:border-color 0.15s,color 0.15s;"
          onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--text)'"
          onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">
          💾 현재 경로 저장
        </button>
      </div>
      <div id="routePanel" style="display:none;">
        <hr class="route-divider">
        <div class="gps-label" style="margin-bottom:4px;">저장된 경로</div>
        <select class="route-select" id="routeSelect" onchange="loadRouteTrack(this.value)">
          <option value="">— 경로 선택 —</option>
        </select>
      </div>
    </div>

    <!-- 범례 -->
    <div class="map-overlay top-left">
      <div class="legend-item">
        <div class="legend-dot" style="background:#6c63ff;"></div> 현재 위치
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#48bfe3; opacity:0.6;"></div> 실시간 경로
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#f4a261; opacity:0.8;"></div> 저장된 경로
      </div>
    </div>

    <div class="last-update" id="lastUpdate">—</div>
  </div>

  <div class="analysis-panel">
    <!-- 왼쪽: 실시간 위험도 분석 -->
    <div class="analysis-half">
      <div class="section-title">실시간 위험도 분석</div>
      <div id="riskBarChart">
        <div style="color:var(--muted); font-size:12px;">탐지 데이터 대기 중...</div>
      </div>
    </div>
    <!-- 오른쪽: 경고안내 -->
    <div class="analysis-half">
      <div class="section-title">경고안내</div>
      <div id="alertLatest">
        <div class="empty-alert">탐지 대기 중...</div>
      </div>
      <div id="alertHistory" class="alert-history" style="display:none;"></div>
    </div>
  </div>
  </div><!-- /center-column -->

</main>

<!-- 토스트 -->
<div id="toast"></div>

<script>
// ── 설정 ──────────────────────────────────────────────
const POLL_MS     = 2000;   // 2초마다 폴링
const SERVER_BASE = window.location.origin;

// ── 지도 초기화 ───────────────────────────────────────
const map = L.map('map', { zoomControl: true, attributionControl: false })
  .setView([37.5665, 126.9780], 15);  // 기본 위치: 서울

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

window.addEventListener('resize', () => map.invalidateSize());
requestAnimationFrame(() => { map.invalidateSize(); });

// 현재 위치 마커
const markerIcon = L.divIcon({
  html: `<div style="
    width:16px;height:16px;
    background:#6c63ff;
    border:3px solid #fff;
    border-radius:50%;
    box-shadow:0 0 0 4px rgba(108,99,255,0.3);
  "></div>`,
  iconSize: [16, 16],
  iconAnchor: [8, 8],
  className: ''
});

let marker    = null;
let trackLine = null;
let routeLine = null;  // 저장된 경로 표시용 (주황색)
let mapCentered = false;
const teamMarkers = {};  // session_id → Leaflet marker

const TEAM_COLORS = ['#ff6b35','#f7c59f','#efefd0','#00a8e8','#f72585','#7209b7','#3a86ff'];
function teamColor(sessionId) {
  let hash = 0;
  for (let c of sessionId) hash = (hash * 31 + c.charCodeAt(0)) & 0xffffffff;
  return TEAM_COLORS[Math.abs(hash) % TEAM_COLORS.length];
}
function makeTeamIcon(color, label) {
  return L.divIcon({
    html: `<div style="
      background:${color};border:2px solid #fff;border-radius:50%;
      width:12px;height:12px;box-shadow:0 0 0 3px ${color}55;
    " title="${label}"></div>`,
    iconSize: [12, 12], iconAnchor: [6, 6], className: ''
  });
}

function renderTeamLocations(locations, mySessionId) {
  const active = new Set();
  for (const loc of locations) {
    if (loc.session_id === mySessionId) continue;  // 내 위치는 기본 마커로 표시
    active.add(loc.session_id);
    const pos = [Number(loc.lat), Number(loc.lng)];
    if (!Number.isFinite(pos[0]) || !Number.isFinite(pos[1])) continue;
    if (teamMarkers[loc.session_id]) {
      teamMarkers[loc.session_id].setLatLng(pos);
    } else {
      const color = teamColor(loc.session_id);
      const shortId = loc.session_id.slice(-6);
      teamMarkers[loc.session_id] = L.marker(pos, { icon: makeTeamIcon(color, shortId) })
        .bindTooltip(shortId, { permanent: false, direction: 'top' })
        .addTo(map);
    }
  }
  // 비활성 팀원 마커 제거
  for (const sid of Object.keys(teamMarkers)) {
    if (!active.has(sid)) { map.removeLayer(teamMarkers[sid]); delete teamMarkers[sid]; }
  }
}

function escapeHtml(value) {
  return String(value)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

// ── 아이콘 매핑 ───────────────────────────────────────
const ICONS = {
  '사람':   '🚶', '자전거':   '🚲', '자동차':   '🚗', '오토바이': '🏍',
  '버스':   '🚌', '기차':     '🚂', '트럭':     '🚛', '의자':     '🪑',
  '소파':   '🛋',  '침대':     '🛏',  '테이블':  '🪞', '계단':     '🪜',
  '신호등': '🚦', '칼':       '🔪', '가위':     '✂️',  '개':       '🐕',
  '고양이': '🐈',  '말':       '🐎', '화분':     '🪴', '병':       '🍶',
  '컵':     '☕',  '우산':     '☂️',  '배낭':    '🎒', '핸드백':   '👜',
  '여행가방':'🧳',  '책':       '📚',
};
// 특정 물체는 SVG 아이콘으로 더 정확하게 표현
const ICON_SVG = {
  '벤치': `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="26" height="26">
    <rect x="2"  y="13" width="28" height="3" rx="1.5" fill="#c8874a"/>
    <rect x="2"  y="17" width="28" height="3" rx="1.5" fill="#c8874a"/>
    <rect x="5"  y="20" width="3"  height="8" rx="1.5" fill="#7a5230"/>
    <rect x="24" y="20" width="3"  height="8" rx="1.5" fill="#7a5230"/>
    <rect x="2"  y="7"  width="28" height="3" rx="1.5" fill="#c8874a"/>
    <rect x="2"  y="10" width="28" height="3" rx="1.5" fill="#c8874a"/>
    <rect x="6"  y="7"  width="3"  height="13" rx="1.5" fill="#7a5230"/>
    <rect x="23" y="7"  width="3"  height="13" rx="1.5" fill="#7a5230"/>
  </svg>`,
};
function getIcon(name) {
  if (ICON_SVG[name]) return ICON_SVG[name];
  return ICONS[name] || '📦';
}

// ── 위험도 판단 ───────────────────────────────────────
// 서버 policy.json 카테고리와 동일 기준
const RISK_CRITICAL = 0.7;
const RISK_BEEP     = 0.4;

const CRITICAL_KO = ['자동차','오토바이','버스','트럭','기차','자전거','곰','코끼리','계단'];
const ANIMAL_KO   = ['개','말','고양이'];
const CAUTION_KO  = ['칼','가위','유리잔','야구 방망이','배낭','핸드백','여행가방','공'];

function getRisk(obj) {
  const d  = obj.distance_m ?? 99;
  const kn = obj.class_ko ?? '';
  if (CRITICAL_KO.includes(kn))               return 'critical';
  if (ANIMAL_KO.includes(kn) && d < 3)        return 'critical';
  if (CAUTION_KO.includes(kn))                return 'beep';
  if (d < 0.5)                                return 'critical';
  if (d < 1.0)                                return 'beep';
  return 'silent';
}

// ── 경고안내 ────────────────────────────────────────
const _alertHistory = [];   // { sentence, alertMode, time }
const ALERT_HISTORY_MAX = 5;

function _koParticle(name) {
  // 한글 마지막 자모 받침(종성) 여부: (코드 - 0xAC00) % 28 != 0 이면 받침 있음
  const code = name.charCodeAt(name.length - 1);
  return (code >= 0xAC00 && code <= 0xD7A3 && (code - 0xAC00) % 28 !== 0) ? '이' : '가';
}

function _buildAlertSentence(objects) {
  if (!objects || objects.length === 0) return null;
  const top  = [...objects].sort((a, b) => (b.risk_score ?? 0) - (a.risk_score ?? 0))[0];
  const name = top.class_ko ?? '물체';
  const dir  = top.direction ?? '';
  const tier = riskTierForObject(top);
  const ig   = _koParticle(name);
  const loc  = dir ? `${dir} 방향에` : '정면에';
  if (tier === 'critical') return `위험! ${dir ? dir + ' ' : ''}${name}! 조심! 멈추세요!`;
  if (tier === 'beep')     return `${loc} ${name}${ig} 있어요. 조심하세요.`;
  return `${loc} ${name}${ig} 있어요.`;
}

function clearAlert() {
  _alertHistory.length = 0;
  const latestEl  = document.getElementById('alertLatest');
  const historyEl = document.getElementById('alertHistory');
  if (latestEl)  latestEl.innerHTML = '<div class="empty-alert">탐지 대기 중...</div>';
  if (historyEl) { historyEl.style.display = 'none'; historyEl.innerHTML = ''; }
}

function renderAlertNotice(sentence, alertMode) {
  const latestEl  = document.getElementById('alertLatest');
  const historyEl = document.getElementById('alertHistory');
  if (!latestEl) return;

  if (!sentence) {
    latestEl.innerHTML = '<div class="empty-alert">탐지 대기 중...</div>';
    return;
  }

  const labelMap = { critical: '위험', beep: '주의', silent: '안전' };
  const label = labelMap[alertMode] ?? '—';
  const now   = new Date().toLocaleTimeString('ko-KR');

  latestEl.innerHTML = `
    <div class="alert-notice-card ${alertMode}">
      <div class="alert-notice-header">
        <span class="alert-mode-badge ${alertMode}">${label}</span>
        <span class="alert-time">${now}</span>
      </div>
      <div class="alert-sentence">${escapeHtml(sentence)}</div>
    </div>`;

  // 히스토리 누적 (silent 제외)
  if (alertMode !== 'silent') {
    _alertHistory.unshift({ sentence, alertMode, time: now });
    if (_alertHistory.length > ALERT_HISTORY_MAX) _alertHistory.pop();
    if (_alertHistory.length > 1) {
      historyEl.style.display = 'flex';
      historyEl.innerHTML = _alertHistory.slice(1).map(h =>
        `<div class="alert-history-item ${h.alertMode}">
           <span style="color:var(--muted);margin-right:6px;">${h.time}</span>${escapeHtml(h.sentence)}
         </div>`
      ).join('');
    }
  }
}

function riskLabel(r) {
  return { critical: '위험', beep: '주의', silent: '안전' }[r] ?? '—';
}

/** 0~1 점수 → 등급 (서버와 동일 임계값) */
function riskTierFromScore(score) {
  const s = Math.max(0, Math.min(1, Number(score)));
  if (s >= RISK_CRITICAL) return 'critical';
  if (s >= RISK_BEEP) return 'beep';
  return 'silent';
}

/** 목록·뱃지·통계: 서버 risk_score 우선, 없을 때만 거리·클래스 휴리스틱 */
function riskTierForObject(obj) {
  const rs = obj.risk_score;
  if (rs != null && Number.isFinite(Number(rs))) return riskTierFromScore(Number(rs));
  return getRisk(obj);
}

/** 서버 risk_score(0~1) 우선, 없으면 휴리스틱 등급을 대략 점수로 환산 */
function objectRiskScore(obj) {
  const rs = obj.risk_score;
  if (rs != null && Number.isFinite(Number(rs))) {
    return Math.max(0, Math.min(1, Number(rs)));
  }
  const tier = getRisk(obj);
  if (tier === 'critical') return 0.85;
  if (tier === 'beep') return 0.5;
  return 0.15;
}

function updateRiskChart(objects) {
  const container = document.getElementById('riskBarChart');
  if (!container) return;

  if (!objects || objects.length === 0) {
    container.innerHTML =
      '<div style="color:var(--muted);font-size:12px;">탐지된 물체 없음</div>';
    return;
  }

  const ranked = [...objects]
    .map(o => ({ o, score: objectRiskScore(o) }))
    .sort((a, b) => b.score - a.score)
    .slice(0, 8);

  container.innerHTML = ranked.map(({ o, score }) => {
    const pct = Math.round(score * 100);
    const tier = riskTierFromScore(score);
    const color = tier === 'critical' ? 'var(--danger)' : tier === 'beep' ? 'var(--warn)' : 'var(--safe)';
    const dir = o.direction ?? '—';
    const name = escapeHtml(o.class_ko ?? '알 수 없음');
    return `
      <div class="risk-bar-row">
        <div class="risk-bar-label">
          <span title="${name}">${name} <span style="color:var(--muted);font-weight:400;">(${escapeHtml(dir)})</span></span>
          <span style="color:${color};font-weight:700;">${pct}%</span>
        </div>
        <div class="risk-bar-track">
          <div class="risk-bar-fill" style="background:${color};width:${pct}%;"></div>
        </div>
      </div>`;
  }).join('');
}

function distLabel(d) {
  if (d == null) return '—';
  if (d < 0.5)  return '코 앞';
  if (d < 1.0)  return '매우 가까이';
  if (d < 2.5)  return '가까이';
  if (d < 5.0)  return '조금 멀리';
  return '멀리';
}

// ── UI 렌더링 ─────────────────────────────────────────
function renderObjects(objects) {
  const list = document.getElementById('objectsList');

  if (!objects || objects.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <span>탐지된 물체 없음</span>
      </div>`;
    document.getElementById('statCritical').textContent = 0;
    document.getElementById('statBeep').textContent     = 0;
    document.getElementById('statSafe').textContent     = 0;
    updateRiskChart([]);
    return;
  }

  let critical = 0, beep = 0, safe = 0;
  const cards = objects.map(obj => {
    const risk = riskTierForObject(obj);
    if (risk === 'critical') critical++;
    else if (risk === 'beep') beep++;
    else safe++;

    const icon = getIcon(obj.class_ko);
    const dir  = obj.direction ?? '—';
    const dist = distLabel(obj.distance_m);

    return `
      <div class="object-card">
        <div class="object-icon ${risk}">${icon}</div>
        <div class="object-info">
          <div class="object-name">${obj.class_ko ?? '알 수 없음'}</div>
          <div class="object-meta">
            <span>📍 ${dir}</span>
            <span>📏 ${dist}</span>
          </div>
        </div>
        <span class="risk-badge ${risk}">${riskLabel(risk)}</span>
      </div>`;
  });

  list.innerHTML = cards.join('');
  document.getElementById('statCritical').textContent = critical;
  document.getElementById('statBeep').textContent     = beep;
  document.getElementById('statSafe').textContent     = safe;
  updateRiskChart(objects);
}

function renderGps(gps, track) {
  // track이 비었으면 live polyline 제거 (경로 저장 완료 후 초기화)
  if (!track || track.length === 0) {
    if (trackLine) { map.removeLayer(trackLine); trackLine = null; }
  }

  if (!gps || !Number.isFinite(Number(gps.lat)) || !Number.isFinite(Number(gps.lng))) {
    document.getElementById('gpsLat').textContent = '—';
    document.getElementById('gpsLng').textContent = '—';
    document.getElementById('trackCount').textContent = 0;
    return;
  }

  const lat = Number(gps.lat);
  const lng = Number(gps.lng);

  document.getElementById('gpsLat').textContent   = lat.toFixed(6);
  document.getElementById('gpsLng').textContent   = lng.toFixed(6);
  document.getElementById('trackCount').textContent = (track?.length ?? 0);

  const pos = [lat, lng];

  // 마커 이동
  if (!marker) {
    marker = L.marker(pos, { icon: markerIcon }).addTo(map);
  } else {
    marker.setLatLng(pos);
  }

  // 경로선 그리기
  if (track && track.length > 1) {
    const coords = track
      .map(p => [Number(p.lat), Number(p.lng)])
      .filter(([a, b]) => Number.isFinite(a) && Number.isFinite(b));
    if (!trackLine) {
      trackLine = L.polyline(coords, {
        color: '#48bfe3',
        weight: 3,
        opacity: 0.6,
        smoothFactor: 1
      }).addTo(map);
    } else {
      trackLine.setLatLngs(coords);
    }
  }

  // 첫 위치 수신 시 지도 이동
  if (!mapCentered && lat !== 0) {
    map.setView(pos, 17);
    mapCentered = true;
  }
}

// ── 폴링 ─────────────────────────────────────────────
const OBJECT_HOLD_MS = 30_000;   // 탐지 후 최소 30초 유지
const GPS_IDLE_MS    = 60_000;   // 60초간 GPS 없음 → 세션 종료로 간주, 경고안내 소거
let prevObjectCount  = 0;
let eventSource      = null;
let pollTimer        = null;
let _objClearTimer   = null;
let _gpsIdleTimer    = null;

function _scheduleObjectClear() {
  if (_objClearTimer) clearTimeout(_objClearTimer);
  _objClearTimer = setTimeout(() => { renderObjects([]); _objClearTimer = null; }, OBJECT_HOLD_MS);
}

function _scheduleGpsIdle() {
  if (_gpsIdleTimer) clearTimeout(_gpsIdleTimer);
  _gpsIdleTimer = setTimeout(() => { clearAlert(); _gpsIdleTimer = null; }, GPS_IDLE_MS);
}

async function poll() {
  const sessionId = document.getElementById('sessionId').value.trim() || '__default__';
  const dot  = document.getElementById('statusDot');
  const text = document.getElementById('statusText');

  try {
    const res  = await fetch(`${SERVER_BASE}/status/${encodeURIComponent(sessionId)}`);
    const data = await res.json();

    dot.className  = 'pulse-dot';
    const resolvedSession = data.session_id ?? sessionId;
    text.textContent = data.gps ? `연결됨 · ${resolvedSession}` : '연결됨 · 세션 선택 필요';

    const pollObjs = data.objects ?? [];
    if (pollObjs.length > 0) {
      // 새 objects 있음 → 표시 + 타이머 리셋
      renderObjects(pollObjs);
      _scheduleObjectClear();
      const sentence = _buildAlertSentence(pollObjs);
      const tier = riskTierForObject(pollObjs[0]);
      const mode = tier === 'critical' ? 'critical' : tier === 'beep' ? 'beep' : 'silent';
      renderAlertNotice(sentence, mode);
    } else if (_objClearTimer === null) {
      // 타이머 없고 objects도 없음 → 소거
      renderObjects([]);
    }
    // 타이머 진행 중이면 빈 응답이 와도 표시 유지

    if (data.gps && Number.isFinite(Number(data.gps?.lat))) _scheduleGpsIdle();
    renderGps(data.gps, data.track);

    // 팀원 위치 업데이트 (실패해도 무시)
    fetch(`${SERVER_BASE}/team-locations`)
      .then(r => r.json())
      .then(d => renderTeamLocations(d.locations ?? [], resolvedSession))
      .catch(() => {});

    // 새 물체 감지 시 토스트
    const currCount = pollObjs.length;
    if (currCount > prevObjectCount && prevObjectCount >= 0) {
      const names = pollObjs.map(o => o.class_ko).join(', ');
      if (names) showToast(`🔍 탐지: ${names}`);
    }
    prevObjectCount = currCount;

    document.getElementById('lastUpdate').innerHTML =
      '마지막 업데이트: ' + new Date().toLocaleTimeString('ko-KR') +
      `<br>탐지: ${currCount}개`;
  } catch (e) {
    dot.className  = 'pulse-dot offline';
    text.textContent = '서버 연결 끊김';
  }
}

function applyPushedStatus(data, sessionId) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  dot.className = 'pulse-dot';
  const resolvedSession = data.session_id ?? sessionId;
  text.textContent = data.gps ? `연결됨 · ${resolvedSession}` : '연결됨 · 세션 선택 필요';

  const objs = data.objects ?? [];
  const isDetectEvent = 'latest_event' in data;  // 실제 탐지 이벤트 여부

  if (objs.length > 0) {
    // 탐지 결과 있음 → 표시하고 12초 유지 타이머 재설정
    renderObjects(objs);
    _scheduleObjectClear();
  } else if (isDetectEvent) {
    // 탐지 이벤트인데 물체 없음 → 명시적 소거
    if (_objClearTimer) { clearTimeout(_objClearTimer); _objClearTimer = null; }
    renderObjects([]);
  }
  // GPS-only 이벤트(latest_event 없음, objects 빈 배열) → 기존 표시 유지

  // 경고안내: SSE 탐지 이벤트에 서버가 생성한 sentence 사용
  if (isDetectEvent) {
    const ev = data.latest_event ?? {};
    const sentence = ev.sentence || (objs.length > 0 ? _buildAlertSentence(objs) : null);
    const alertMode = ev.alert_mode || (objs.length > 0 ? (riskTierForObject(objs[0]) === 'critical' ? 'critical' : riskTierForObject(objs[0]) === 'beep' ? 'beep' : 'silent') : 'silent');
    if (sentence) renderAlertNotice(sentence, alertMode);
  }

  if (data.gps && Number.isFinite(Number(data.gps?.lat))) _scheduleGpsIdle();
  renderGps(data.gps, data.track);

  // 경로 저장 완료 신호 수신 시 콤보박스 목록 새로고침
  if (data.route_saved) loadRouteList();

  fetch(`${SERVER_BASE}/team-locations`)
    .then(r => r.json())
    .then(d => renderTeamLocations(d.locations ?? [], resolvedSession))
    .catch(() => {});

  const currCount = objs.length;
  if (currCount > prevObjectCount && prevObjectCount >= 0) {
    const names = objs.map(o => o.class_ko).join(', ');
    if (names) showToast(`감지: ${names}`);
  }
  prevObjectCount = currCount;

  document.getElementById('lastUpdate').innerHTML =
    '마지막 업데이트: ' + new Date().toLocaleTimeString('ko-KR') +
    `<br>감지: ${currCount}개`;
}

function connectEventStream() {
  const sessionId = document.getElementById('sessionId').value.trim() || '__default__';
  if (eventSource) eventSource.close();
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }

  eventSource = new EventSource(`${SERVER_BASE}/events/${encodeURIComponent(sessionId)}`);
  eventSource.addEventListener('status', (event) => {
    applyPushedStatus(JSON.parse(event.data), sessionId);
  });
  eventSource.onerror = () => {
    document.getElementById('statusDot').className = 'pulse-dot offline';
    document.getElementById('statusText').textContent = 'SSE 재연결 중';
    if (!pollTimer) pollTimer = setInterval(poll, POLL_MS * 2);
  };
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── 세션 탐색 ─────────────────────────────────────────
async function loadSessions() {
  const box = document.getElementById('sessionList');
  box.style.display = 'block';
  box.innerHTML = '<div style="padding:10px 14px;font-size:12px;color:var(--muted)">불러오는 중...</div>';
  try {
    const res  = await fetch(`${SERVER_BASE}/sessions`);
    const data = await res.json();
    const sessions = data.sessions ?? [];
    if (sessions.length === 0) {
      box.innerHTML = '<div style="padding:10px 14px;font-size:12px;color:var(--muted)">GPS 데이터 없음<br>앱에서 분석을 시작하세요</div>';
    } else {
      box.innerHTML = sessions.map(s => `
        <div class="session-option" data-session="${escapeHtml(s)}" style="
          padding:9px 14px;font-size:13px;cursor:pointer;
          border-bottom:1px solid var(--border);
          transition:background 0.15s;"
          onmouseover="this.style.background='var(--surface)'"
          onmouseout="this.style.background=''">
          📡 ${escapeHtml(s)}
        </div>`).join('');
      box.querySelectorAll('.session-option').forEach(el => {
        el.addEventListener('click', () => selectSession(el.dataset.session));
      });
    }
  } catch(e) {
    box.innerHTML = '<div style="padding:10px 14px;font-size:12px;color:var(--danger)">서버 연결 실패</div>';
  }
  // 외부 클릭 시 닫기
  setTimeout(() => document.addEventListener('click', function h(e){
    if (!box.contains(e.target)) { box.style.display='none'; document.removeEventListener('click',h); }
  }), 100);
}

function selectSession(s) {
  document.getElementById('sessionId').value = s;
  document.getElementById('sessionList').style.display = 'none';
  prevObjectCount = 0; mapCentered = false;
  if (_objClearTimer) { clearTimeout(_objClearTimer); _objClearTimer = null; }
  if (_gpsIdleTimer)  { clearTimeout(_gpsIdleTimer);  _gpsIdleTimer  = null; }
  _alertHistory.length = 0;
  renderAlertNotice(null, 'silent');
  if (marker)    { map.removeLayer(marker);    marker    = null; }
  if (trackLine) { map.removeLayer(trackLine); trackLine = null; }
  if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
  connectEventStream();
  refreshHistory();
  loadRouteList();
}

// ── 세션 ID 변경 시 리셋 ─────────────────────────────
document.getElementById('sessionId').addEventListener('change', () => {
  prevObjectCount = 0;
  mapCentered     = false;
  if (_objClearTimer) { clearTimeout(_objClearTimer); _objClearTimer = null; }
  if (_gpsIdleTimer)  { clearTimeout(_gpsIdleTimer);  _gpsIdleTimer  = null; }
  _alertHistory.length = 0;
  renderAlertNotice(null, 'silent');
  if (marker)    { map.removeLayer(marker);    marker    = null; }
  if (trackLine) { map.removeLayer(trackLine); trackLine = null; }
  if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
  connectEventStream();
  loadRouteList();
});

// ── 저장된 경로 목록 로딩 ────────────────────────────
async function loadRouteList() {
  const sessionId = document.getElementById('sessionId').value.trim() || '__default__';
  const panel  = document.getElementById('routePanel');
  const select = document.getElementById('routeSelect');
  try {
    // 저장된 경로 + 현재 실시간 트랙을 병렬로 조회
    const [routeRes, statusRes] = await Promise.all([
      fetch(`${SERVER_BASE}/routes/${encodeURIComponent(sessionId)}`),
      fetch(`${SERVER_BASE}/status/${encodeURIComponent(sessionId)}`),
    ]);

    const routes = routeRes.ok ? ((await routeRes.json()).routes ?? []) : [];
    const track  = statusRes.ok ? ((await statusRes.json()).track ?? []) : [];

    // 현재 트랙도 없고 저장된 경로도 없으면 숨김
    if (routes.length === 0 && track.length < 2) {
      panel.style.display = 'none';
      return;
    }

    let options = '<option value="">— 경로 선택 —</option>';

    // 현재 실시간 트랙이 있으면 맨 위에 고정 옵션으로 추가
    if (track.length >= 2) {
      options += `<option value="__live__">📍 현재 이동 경로 (${track.length}pts)</option>`;
    }

    // 저장된 경로 목록
    options += routes.map(r => {
      const label = r.name || r.route_id.slice(0, 8);
      const pts   = r.point_count ? ` (${r.point_count}pts)` : '';
      return `<option value="${escapeHtml(r.route_id)}">${escapeHtml(label)}${pts}</option>`;
    }).join('');

    select.innerHTML = options;
    panel.style.display = 'block';
  } catch (_) {
    panel.style.display = 'none';
  }
}

async function loadRouteTrack(routeId) {
  if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
  if (!routeId) return;
  const sessionId = document.getElementById('sessionId').value.trim() || '__default__';

  let coords = [];

  if (routeId === '__live__') {
    // 현재 실시간 트랙 — status 엔드포인트에서 가져옴
    try {
      const res  = await fetch(`${SERVER_BASE}/status/${encodeURIComponent(sessionId)}`);
      if (!res.ok) return;
      const data = await res.json();
      coords = (data.track ?? [])
        .map(p => [Number(p.lat), Number(p.lng)])
        .filter(([a, b]) => Number.isFinite(a) && Number.isFinite(b));
    } catch (_) { return; }
  } else {
    // 저장된 경로
    try {
      const res  = await fetch(`${SERVER_BASE}/routes/${encodeURIComponent(sessionId)}/${encodeURIComponent(routeId)}`);
      if (!res.ok) return;
      const data = await res.json();
      coords = (data.points ?? [])
        .map(p => [Number(p.lat), Number(p.lng)])
        .filter(([a, b]) => Number.isFinite(a) && Number.isFinite(b));
    } catch (_) { return; }
  }

  if (coords.length < 2) return;
  routeLine = L.polyline(coords, {
    color: '#f4a261',
    weight: 3,
    opacity: 0.8,
    dashArray: '6 4',
    smoothFactor: 1,
  }).addTo(map);
  map.fitBounds(routeLine.getBounds(), { padding: [40, 40] });
}

// ── 24시간 탐지 내역 ──────────────────────────────────
// 폴링 주기: 30초 (앱의 /detect 호출 주기와 완전히 별개)
// 앱 FPS에 영향 없음 — 브라우저만 이 API를 호출함
const HISTORY_POLL_MS = 30_000;

/**
 * 서버의 /history/{sessionId} 를 호출해 24시간 내역을 가져온다.
 * 실패해도 조용히 무시 (내역은 부가 정보이므로 앱 동작에 영향 없음).
 */
async function fetchHistory() {
  const sessionId = document.getElementById('sessionId').value.trim() || '__default__';
  try {
    const res  = await fetch(`${SERVER_BASE}/history/${encodeURIComponent(sessionId)}`);
    if (!res.ok) return;
    const data = await res.json();
    renderHistory(data);
  } catch (_) {
    // 네트워크 오류 시 현재 표시 유지
  }
}

/**
 * 24시간 내역 데이터를 화면에 렌더링한다.
 *
 * summary 예시: { total: 42, critical: 5, beep: 20, safe: 17 }
 * events  예시: [{ timestamp, objects:[{class_ko, direction, distance_m}], risk }, ...]
 */
function renderHistory(data) {
  const summary = data.summary ?? {};
  const events  = data.events  ?? [];

  // ── 요약 통계 업데이트 ──────────────────────────────
  document.getElementById('histCritical').textContent = summary.critical ?? 0;
  document.getElementById('histBeep').textContent     = summary.beep     ?? 0;
  document.getElementById('histSafe').textContent     = summary.safe     ?? 0;

  // ── 이벤트 목록 렌더링 ──────────────────────────────
  const list = document.getElementById('historyList');

  if (events.length === 0) {
    list.innerHTML = `
      <div class="empty-state" style="padding:20px;">
        <span style="font-size:12px;">최근 24시간 탐지 내역 없음</span>
      </div>`;
    return;
  }

  // 위험도 → 뱃지 색상 매핑 (실시간 현황의 risk-badge와 동일한 클래스 사용)
  const badgeClass = { critical: 'critical', beep: 'beep', safe: 'silent' };
  const badgeLabel = { critical: '위험',    beep: '주의', safe: '안전'  };

  list.innerHTML = events.map(ev => {
    // 시각 포맷: "오전 09:42" 형식으로 표시
    const timeStr = formatHistoryTime(ev.timestamp);

    // 물체 이름 목록 (최대 3개, 이모지 포함)
    const names = (ev.objects ?? [])
      .map(o => `${getIcon(o.class_ko ?? '')} ${escapeHtml(o.class_ko ?? '알 수 없음')}`)
      .join(' · ') || '물체 없음';

    const risk  = ev.risk ?? 'safe';
    const badge = `<span class="risk-badge ${badgeClass[risk]}">${badgeLabel[risk]}</span>`;

    return `
      <div class="history-item">
        <span class="history-time">${timeStr}</span>
        <span class="history-objects">${names}</span>
        ${badge}
      </div>`;
  }).join('');
}

/**
 * ISO 타임스탬프를 "HH:MM" 형식으로 변환한다.
 * 파싱 실패 시 원본 문자열 앞 5자리를 반환.
 */
function formatHistoryTime(isoStr) {
  if (!isoStr) return '—';
  const d = new Date(isoStr);
  if (isNaN(d.getTime())) return String(isoStr).slice(11, 16); // 파싱 실패 시 HH:MM 추출
  return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false });
}

// 페이지 로드 직후 1회 + 30초마다 반복 조회
fetchHistory();
setInterval(fetchHistory, HISTORY_POLL_MS);

// 세션 변경 시 내역도 즉시 갱신
function refreshHistory() { fetchHistory(); }

// ── 현재 경로 저장 ───────────────────────────────────
async function saveCurrentRoute() {
  const sessionId = document.getElementById('sessionId').value.trim() || '__default__';
  const btn = document.getElementById('btnSaveRoute');
  btn.disabled = true;
  btn.textContent = '저장 중...';
  const name = `${sessionId} ${new Date().toLocaleString('ko-KR', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}`;
  try {
    const res = await fetch(`${SERVER_BASE}/gps/route/save`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({device_id: sessionId, name}),
    });
    const data = await res.json();
    if (data.saved) {
      showToast(`경로 저장 완료 — ${name} (${data.point_count ?? 0}pts)`);
      await loadRouteList();
    } else {
      showToast(`저장 건너뜀: ${data.reason || 'GPS 데이터 없음'}`);
    }
  } catch(e) {
    showToast('경로 저장 중 오류 발생');
  } finally {
    btn.disabled = false;
    btn.textContent = '💾 현재 경로 저장';
  }
}

// ── 시작 ─────────────────────────────────────────────
connectEventStream();
loadRouteList();
</script>
